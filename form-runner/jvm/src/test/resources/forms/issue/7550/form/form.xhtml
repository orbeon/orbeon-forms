<xh:html xmlns:xh="http://www.w3.org/1999/xhtml" xmlns:xf="http://www.w3.org/2002/xforms"
         xmlns:xs="http://www.w3.org/2001/XMLSchema"
         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
         xmlns:ev="http://www.w3.org/2001/xml-events"
         xmlns:xi="http://www.w3.org/2001/XInclude"
         xmlns:xxi="http://orbeon.org/oxf/xml/xinclude"
         xmlns:xxf="http://orbeon.org/oxf/xml/xforms"
         xmlns:map="http://www.w3.org/2005/xpath-functions/map"
         xmlns:array="http://www.w3.org/2005/xpath-functions/array"
         xmlns:math="http://www.w3.org/2005/xpath-functions/math"
         xmlns:exf="http://www.exforms.org/exf/1-0"
         xmlns:fr="http://orbeon.org/oxf/xml/form-runner"
         xmlns:saxon="http://saxon.sf.net/"
         xmlns:sql="http://orbeon.org/oxf/xml/sql"
         xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/"
         xmlns:fb="http://orbeon.org/oxf/xml/form-builder">
    <xh:head>
        <xf:model id="fr-form-model" xxf:expose-xpath-types="true" xxf:analysis.calculate="true">

            <!-- Main instance -->
            <xf:instance id="fr-form-instance" xxf:exclude-result-prefixes="#all" xxf:index="id">
                <form>
                    <section-1>
                        <my-repeated-grid>
                            <my-repeated-grid-iteration>
                                <my-value>bar</my-value>
                                <my-condition>false</my-condition>
                                <my-button/>
                                <out/>
                            </my-repeated-grid-iteration>
                            <my-repeated-grid-iteration>
                                <my-value>baz</my-value>
                                <my-condition>false</my-condition>
                                <my-button/>
                                <out/>
                            </my-repeated-grid-iteration>
                        </my-repeated-grid>

                    </section-1>
                </form>
            </xf:instance>

            <!-- Bindings -->
            <xf:bind id="fr-form-binds" ref="instance('fr-form-instance')">
                <xf:bind id="section-1-bind" name="section-1" ref="section-1">
                    <xf:bind id="my-repeated-grid-bind" ref="my-repeated-grid" name="my-repeated-grid">
                        <xf:bind id="my-repeated-grid-iteration-bind" ref="my-repeated-grid-iteration"
                                 name="my-repeated-grid-iteration">
                            <xf:bind id="my-value-bind" ref="my-value" name="my-value" xxf:whitespace="trim"/>
                            <xf:bind id="my-condition-bind" ref="my-condition" name="my-condition" type="xf:boolean"/>
                            <xf:bind id="my-button-bind" ref="my-button" name="my-button"/>
                            <xf:bind id="out-bind" ref="out" name="out"/>
                        </xf:bind>
                    </xf:bind>

                </xf:bind>
            </xf:bind>

            <!-- Metadata -->
            <xf:instance id="fr-form-metadata" xxf:readonly="true" xxf:exclude-result-prefixes="#all">
                <metadata>
                    <application-name>issue</application-name>
                    <form-name>7550</form-name>
                    <title xml:lang="en">Service with variable in URL AVT fails #7550</title>
                    <description xml:lang="en"/>

                    <library-versions>
                        <_>1</_>
                        <orbeon>2</orbeon>
                        <app>2</app>
                    </library-versions>
                    <created-with-version>2026.1-SNAPSHOT PE</created-with-version>
                    <updated-with-version>2026.1-SNAPSHOT PE</updated-with-version>
                    <email>
                        <templates>
                            <template name="default">
                                <headers/>
                                <exclude-from-all-control-values/>
                            </template>
                        </templates>
                        <parameters/>
                    </email>
                </metadata>
            </xf:instance>

            <!-- Attachments -->
            <xf:instance id="fr-form-attachments" xxf:exclude-result-prefixes="#all">
                <attachments/>
            </xf:instance>

            <!-- All form resources -->
            <xf:instance xxf:readonly="true" id="fr-form-resources" xxf:exclude-result-prefixes="#all">
                <resources>
                    <resource xml:lang="en">
                        <my-value>
                            <label>My value</label>
                            <hint/>
                        </my-value>
                        <my-condition>
                            <label>My condition</label>
                            <hint/>
                        </my-condition>
                        <my-button>
                            <label>My button</label>
                            <hint/>
                        </my-button>
                        <out>
                            <label>Out</label>
                            <hint/>
                        </out>
                        <section-1>
                            <label/>
                        </section-1>
                        <my-repeated-grid/>

                    </resource>
                </resources>
            </xf:instance>
            <xf:instance xxf:readonly="true" id="my-repeated-grid-template"
                         xxf:exclude-result-prefixes="#all">
                <my-repeated-grid-iteration>
                    <my-value/>
                    <my-condition>false</my-condition>
                    <my-button/>
                    <out/>
                </my-repeated-grid-iteration>
            </xf:instance>

            <xf:instance id="my-service-instance" class="fr-service" xxf:exclude-result-prefixes="#all">
                        <body xmlns:xxbl="http://orbeon.org/oxf/xml/xbl"
                      xmlns:fbf="java:org.orbeon.oxf.fb.FormBuilderXPathApi">&lt;params/&gt;</body>
                    </xf:instance>
            <xf:submission id="my-service-submission" class="fr-service"
                           resource="/fr/service/custom/orbeon/echo?foo={$my-value}"
                           method="get"
                           serialization="none"
                           mediatype=""/>
            <xf:action id="my-action-binding">
                <xf:action xmlns:xbl="http://www.w3.org/ns/xbl" xmlns:p="http://www.orbeon.com/oxf/pipeline"
                           xmlns:d="DAV:"
                           xmlns:utils="java:org.orbeon.oxf.util.StringUtils"
                           xmlns:frf="java:org.orbeon.oxf.fr.FormRunner"
                           xmlns:fbf="java:org.orbeon.oxf.fb.FormBuilderXPathApi"
                           xmlns:secure="java:org.orbeon.oxf.util.SecureUtils"
                           xmlns:Wizard="java:org.orbeon.xbl.Wizard"
                           event="DOMActivate"
                           ev:observer="my-button-control"
                           if="$my-condition = true()">
                    <xf:send submission="my-service-submission"/>
                </xf:action>
                <xf:action xmlns:xbl="http://www.w3.org/ns/xbl" xmlns:p="http://www.orbeon.com/oxf/pipeline"
                           xmlns:d="DAV:"
                           xmlns:utils="java:org.orbeon.oxf.util.StringUtils"
                           xmlns:frf="java:org.orbeon.oxf.fr.FormRunner"
                           xmlns:fbf="java:org.orbeon.oxf.fb.FormBuilderXPathApi"
                           xmlns:secure="java:org.orbeon.oxf.util.SecureUtils"
                           xmlns:Wizard="java:org.orbeon.xbl.Wizard"
                           event="xforms-submit"
                           ev:observer="my-service-submission">
                    <xf:var name="request-instance-name" value="'my-service-instance'"/>
                    <xf:action/>
                </xf:action>
                <xf:action xmlns:xbl="http://www.w3.org/ns/xbl" xmlns:p="http://www.orbeon.com/oxf/pipeline"
                           xmlns:d="DAV:"
                           xmlns:utils="java:org.orbeon.oxf.util.StringUtils"
                           xmlns:frf="java:org.orbeon.oxf.fr.FormRunner"
                           xmlns:fbf="java:org.orbeon.oxf.fb.FormBuilderXPathApi"
                           xmlns:secure="java:org.orbeon.oxf.util.SecureUtils"
                           xmlns:Wizard="java:org.orbeon.xbl.Wizard"
                           event="xforms-submit-done"
                           ev:observer="my-service-submission">
                    <xf:action class="fr-set-control-value-action">
                        <xf:var name="control-name" value="'out'"/>
                        <xf:var name="control-value" value="event('resource-uri')"/>
                    </xf:action>
                </xf:action>
            </xf:action>
        </xf:model>
    </xh:head>
    <xh:body>
        <fr:view>
            <fr:body xmlns:xbl="http://www.w3.org/ns/xbl" xmlns:p="http://www.orbeon.com/oxf/pipeline"
                     xmlns:oxf="http://www.orbeon.com/oxf/processors">
                <fr:section id="section-1-section" bind="section-1-bind">
                    <fr:grid id="my-repeated-grid-grid" bind="my-repeated-grid-bind" repeat="content"
                             min="1"
                             template="instance('my-repeated-grid-template')"
                             apply-defaults="true"
                             fb:initial-iterations="first">
                        <fr:c y="1" x="1" w="6">
                            <xf:input xmlns="http://orbeon.org/oxf/xml/form-builder" id="my-value-control"
                                      bind="my-value-bind">
                                <xf:label ref="$form-resources/my-value/label"/>
                                <xf:hint ref="$form-resources/my-value/hint"/>
                                <xf:alert ref="$fr-resources/detail/labels/alert"/>


                            </xf:input>

                            </fr:c>
                        <fr:c y="1" x="7" w="6">
                            <xf:input xmlns="http://orbeon.org/oxf/xml/form-builder"
                                               xmlns:xsl="http://www.w3.org/1999/XSL/Transform"
                                               xmlns:xxbl="http://orbeon.org/oxf/xml/xbl"
                                               id="my-condition-control"
                                               bind="my-condition-bind">
                                <xf:label ref="$form-resources/my-condition/label"/>
                                <xf:hint ref="$form-resources/my-condition/hint"/>
                                <xf:alert ref="$fr-resources/detail/labels/alert"/>


                            </xf:input>
                        </fr:c>
                        <fr:c x="1" y="2" w="6">
                            <xf:trigger xmlns="http://orbeon.org/oxf/xml/form-builder" id="my-button-control"
                                        bind="my-button-bind">
                                <xf:label ref="$form-resources/my-button/label"/>

                                <xf:hint ref="$form-resources/my-button/hint"/>
                                <xf:alert ref="$fr-resources/detail/labels/alert"/>

                            </xf:trigger>
                        </fr:c>
                        <fr:c x="7" y="2" w="6">
                            <xf:output xmlns="http://orbeon.org/oxf/xml/form-builder" id="out-control" bind="out-bind">
                                <xf:label ref="$form-resources/out/label"/>
                                <xf:hint ref="$form-resources/out/hint"/>
                                <xf:alert ref="$fr-resources/detail/labels/alert"/>


                            </xf:output>
                        </fr:c>
                    </fr:grid>
                </fr:section>
            </fr:body>
        </fr:view>
    </xh:body>
</xh:html>
